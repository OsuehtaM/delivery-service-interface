<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>DeliveryService</title>
</head>
<body>
    <header>
        <h1>Functions</h1>
        <nav>
            <ul>
                <li><a href="#register">Register</a></li>
                <li><a href="#read">Read</a></li>
                <li><a href="#update">Update</a></li>
                <li><a href="#delete">Delete</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="register">
            <h2 class="section-title">Register Client</h2>
            <form id="registerForm">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="cpfCnpj">CPF / CNPJ</label>
                <input type="text" id="cpfCnpj" name="cpfCnpj" placeholder="012345678910" required>

                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Exemple Street">

                <label for="city">City</label>
                <input type="text" id="city" name="city">

                <label for="state">State</label>
                <input type="text" id="state" name="state" maxlength="2" placeholder="CA">

                <button type="submit">Register</button>
            </form>
        </section>

        <section id="update">
            <h2 class="section-title">Update Client</h2>
            <form id="updateForm">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="cpfCnpj">CPF / CNPJ</label>
                <input type="text" id="cpfCnpj" name="cpfCnpj" placeholder="012345678910" required>

                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Exemple Street">

                <label for="city">City</label>
                <input type="text" id="city" name="city">

                <label for="state">State</label>
                <input type="text" id="state" name="state" maxlength="2" placeholder="CA">

                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    
</body>
</html>
